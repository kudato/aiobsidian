site_name: aiobsidian
site_url: https://kudato.github.io/aiobsidian
site_description: Async Python client for Obsidian — CLI-first with optional REST support
repo_url: https://github.com/kudato/aiobsidian
repo_name: kudato/aiobsidian

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - Vault Operations: guide/vault.md
      - Active File: guide/active-file.md
      - Periodic Notes: guide/periodic-notes.md
      - Commands: guide/commands.md
      - Search: guide/search.md
      - Open Files: guide/open.md
      - Error Handling: guide/error-handling.md
  - API Reference:
      - ObsidianCLI: reference/cli.md
      - CLI Resources:
          - Vault: reference/resources/cli-vault.md
          - Daily: reference/resources/cli-daily.md
          - Search: reference/resources/cli-search.md
          - Properties: reference/resources/cli-properties.md
          - Tags: reference/resources/cli-tags.md
          - Links: reference/resources/cli-links.md
          - Tasks: reference/resources/cli-tasks.md
          - Commands: reference/resources/cli-commands.md
          - Templates: reference/resources/cli-templates.md
          - Bookmarks: reference/resources/cli-bookmarks.md
      - ObsidianClient (REST): reference/client.md
      - REST Resources:
          - Vault: reference/resources/vault.md
          - Active File: reference/resources/active.md
          - Periodic Notes: reference/resources/periodic.md
          - Commands: reference/resources/commands.md
          - Search: reference/resources/search.md
          - Open: reference/resources/open.md
          - System: reference/resources/system.md
      - Models: reference/models.md
      - Enums: reference/enums.md
      - Exceptions: reference/exceptions.md
